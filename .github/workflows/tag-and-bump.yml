name: Tag & Bump

# Manually triggered to start a release.
#
# Opens a PR that bumps the version in every place it appears (package.json,
# package-lock.json, src/index.ts, manifest.json, server.json, .claude-plugin/
# plugin.json, .claude-plugin/marketplace.json). The PR auto-merges once CI
# passes (see auto-merge.yml). On merge to main, tag-on-release-merge.yml
# tags the *parent* of the merge commit with the version that was on main
# before the bump (the released content), which triggers Release.

on:
  workflow_dispatch:

jobs:
  open-bump-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # PAT required — GITHUB_TOKEN pushes don't fire other workflows,
          # so the PR's CI wouldn't run if we used the default token.
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute current and next versions
        id: versions
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          npm version patch --no-git-tag-version >/dev/null
          NEXT=$(node -p "require('./package.json').version")
          # Undo the working-tree change — we'll re-apply on the branch.
          git checkout -- package.json package-lock.json
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Create release branch
        run: git switch -c "release/v${{ steps.versions.outputs.next }}"

      - name: Bump version everywhere
        env:
          CURRENT: ${{ steps.versions.outputs.current }}
          NEXT: ${{ steps.versions.outputs.next }}
        run: |
          npm version "$NEXT" --no-git-tag-version --allow-same-version

          # src/index.ts — MCP server version literal
          sed -i "s/version: '${CURRENT}'/version: '${NEXT}'/" src/index.ts

          # All JSON version files (manifest.json, server.json, .claude-plugin/*)
          node -e "
            const fs = require('fs');
            for (const f of ['manifest.json', 'server.json', '.claude-plugin/plugin.json', '.claude-plugin/marketplace.json']) {
              if (!fs.existsSync(f)) continue;
              const o = JSON.parse(fs.readFileSync(f, 'utf8'));
              if (o.version !== undefined) o.version = '${NEXT}';
              if (o.metadata?.version !== undefined) o.metadata.version = '${NEXT}';
              if (Array.isArray(o.packages)) o.packages.forEach(p => { if (p.version !== undefined) p.version = '${NEXT}'; });
              if (Array.isArray(o.plugins)) o.plugins.forEach(p => { if (p.version !== undefined) p.version = '${NEXT}'; });
              fs.writeFileSync(f, JSON.stringify(o, null, 2) + '\n');
            }
          "

      - name: Rebuild
        run: npm run build

      - name: Commit and push
        env:
          NEXT: ${{ steps.versions.outputs.next }}
        run: |
          git add -A
          git commit -m "chore: bump version to v${NEXT}"
          git push -u origin "release/v${NEXT}"

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          CURRENT: ${{ steps.versions.outputs.current }}
          NEXT: ${{ steps.versions.outputs.next }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "release/v${NEXT}" \
            --label "ignore-for-release" \
            --title "chore: release v${CURRENT} (bump main to v${NEXT})" \
            --body "$(cat <<EOF
          Releases **v${CURRENT}** and bumps main to **v${NEXT}**.

          When this PR merges, [tag-on-release-merge.yml](.github/workflows/tag-on-release-merge.yml)
          tags the parent of the merge commit with \`v${CURRENT}\` — that's the
          content on main *before* this bump, i.e. the released version.
          That tag push triggers [release.yml](.github/workflows/release.yml)
          which publishes to npm + the MCP Registry + ClawHub and creates
          the GitHub Release.

          Auto-generated by [Tag & Bump](.github/workflows/tag-and-bump.yml).
          Labeled \`ignore-for-release\` so this PR does not appear in
          the v${CURRENT} release notes.
          EOF
          )")
          echo "Opened $PR_URL"

          # Follow-up add of `ready-to-merge` so auto-merge.yml arms.
          # Labels passed to `gh pr create` are bundled into the `opened`
          # event and DON'T fire a separate `labeled` event — only a
          # post-create label add does. So this is a deliberate second
          # call to make `arm-owner-on-ready-label` actually trigger.
          gh pr edit "$PR_URL" --add-label ready-to-merge
          echo "Added ready-to-merge to $PR_URL"
