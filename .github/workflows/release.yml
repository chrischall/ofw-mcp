name: Release

on:
  # Triggered automatically after Bump Version workflow succeeds
  workflow_run:
    workflows: ["Bump Version"]
    types: [completed]
  # Also triggered by manually pushed tags
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write  # needed to create GitHub releases
      id-token: write  # needed for npm provenance

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get latest tag
        id: tag
        run: echo "name=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Package the .skill file
      - name: Package skill
        run: |
          python3 - <<'EOF'
          import zipfile, pathlib

          skill_name = "ofw-mcp"
          out = pathlib.Path(f"{skill_name}.skill")

          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              zf.write(pathlib.Path("SKILL.md"), f"{skill_name}/SKILL.md")

          print(f"Packaged {out} ({out.stat().st_size} bytes)")
          EOF

      # Publish to npm via OIDC Trusted Publishing (no token required)
      - name: Publish to npm
        run: npm publish --access public --provenance

      # Create GitHub Release and attach .skill file
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: ofw-mcp.skill
          generate_release_notes: true
