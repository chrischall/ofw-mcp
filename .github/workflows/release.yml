name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create GitHub releases

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Package the .skill file
      - name: Package skill
        run: |
          pip install --quiet zip-skills 2>/dev/null || true
          python3 - <<'EOF'
          import zipfile, os, pathlib

          skill_name = "ofw-mcp"
          skill_md = pathlib.Path("SKILL.md")
          out = pathlib.Path(f"{skill_name}.skill")

          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              zf.write(skill_md, f"{skill_name}/SKILL.md")

          print(f"Packaged {out} ({out.stat().st_size} bytes)")
          EOF

      # Publish to npm
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create GitHub Release and attach .skill file
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ofw-mcp.skill
          generate_release_notes: true
