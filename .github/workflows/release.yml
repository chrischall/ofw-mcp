name: Release

# Triggered by the tag push that release-please creates when its release
# PR merges. release-please has already authored the GitHub Release with
# the CHANGELOG content; this workflow:
#   1. Verifies every version file matches the tag (failing fast if
#      release-please's bump logic ever drifted).
#   2. Builds and packages the .mcpb bundle and .skill artifact.
#   3. Publishes to npm (with provenance, idempotent), the MCP Registry
#      (OIDC), and ClawHub (optional).
#   4. Attaches the .mcpb and .skill artifacts to the existing release.

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Strip always-auth from .npmrc (set by setup-node, deprecated in npm 11)
      - run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

      - run: npm ci
      - run: npm run build

      - name: Extract version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # Defensive: fail loudly if any tracked version file disagrees with
      # package.json's version. release-please should keep these in lockstep
      # via its extra-files config — this assertion catches the case where
      # a new file with a `version` field was added without registering it
      # in release-please-config.json.
      - name: Assert all version files match
        run: |
          node -e "
            const fs = require('fs');
            const expected = '$VERSION';
            const checks = [
              { path: 'manifest.json',                  get: o => o.version },
              { path: 'server.json',                    get: o => o.version },
              { path: 'server.json',                    get: o => o.packages?.[0]?.version },
              { path: '.claude-plugin/plugin.json',     get: o => o.version },
              { path: '.claude-plugin/marketplace.json', get: o => o.metadata?.version },
              { path: '.claude-plugin/marketplace.json', get: o => o.plugins?.[0]?.version },
            ];
            let bad = 0;
            for (const c of checks) {
              if (!fs.existsSync(c.path)) continue;
              const actual = c.get(JSON.parse(fs.readFileSync(c.path, 'utf8')));
              if (actual !== expected) {
                console.error('MISMATCH', c.path, 'expected', expected, 'got', actual);
                bad++;
              }
            }
            // src/index.ts — check the line tagged with x-release-please-version
            const idx = fs.readFileSync('src/index.ts', 'utf8');
            const m = idx.match(/version:\s*'([^']+)'.*x-release-please-version/);
            if (!m) { console.error('src/index.ts: x-release-please-version sentinel not found'); bad++; }
            else if (m[1] !== expected) { console.error('MISMATCH src/index.ts expected', expected, 'got', m[1]); bad++; }
            if (bad > 0) { console.error('FAIL: ' + bad + ' version mismatches'); process.exit(1); }
            console.log('OK: all version files match', expected);
          "

      # Package the .skill file
      - name: Package skill
        run: |
          python3 - <<'EOF'
          import zipfile, pathlib, os

          version = os.environ["VERSION"]
          skill_name = "ofw-mcp"
          out = pathlib.Path(f"{skill_name}-{version}.skill")

          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              zf.write(pathlib.Path("skills/ofw/SKILL.md"), f"{skill_name}/SKILL.md")

          print(f"Packaged {out} ({out.stat().st_size} bytes)")
          EOF

      - name: Build .mcpb bundle
        run: |
          npx @anthropic-ai/mcpb pack
          mv ofw-mcp.mcpb "ofw-mcp-${VERSION}.mcpb"

      # Idempotent: skip if this version is already on the registry, so the
      # workflow can be re-run safely on the same tag (e.g. after a flaky
      # downstream publish step).
      - name: Publish to npm
        run: |
          PKG=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "npm already has ${PKG}@${VERSION} — skipping publish."
            exit 0
          fi
          npm publish --access public --provenance

      # ─── modelcontextprotocol/registry (PulseMCP auto-ingests weekly) ───
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      # ─── ClawHub (OpenClaw skill registry) — conditional on CLAWHUB_TOKEN ───
      # GitHub Actions disallows `secrets.*` in step-level `if:`, so the
      # token check happens inside the run block.
      - name: Publish skill to ClawHub
        continue-on-error: true
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set — skipping ClawHub publish."
            exit 0
          fi
          if [ ! -f skills/ofw/SKILL.md ]; then
            echo "skills/ofw/SKILL.md not present — skipping ClawHub publish."
            exit 0
          fi
          npx --yes clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          # ClawHub's `publish` rejects folders that look like a plugin
          # (.claude-plugin/plugin.json present), and `package publish`
          # requires an openclaw.plugin.json we don't have. Workaround: copy
          # SKILL.md to a clean temp dir and publish that as a standalone skill.
          SKILL_DIR=$(mktemp -d)
          cp skills/ofw/SKILL.md "$SKILL_DIR/"
          npx --yes clawhub publish "$SKILL_DIR" --version "${VERSION}" --slug ofw-mcp

      # release-please already created the GitHub Release with CHANGELOG
      # content; just attach the build artifacts. --clobber so re-running
      # the workflow on the same tag overwrites prior uploads.
      - name: Attach artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${VERSION}" \
            "ofw-mcp-${VERSION}.skill" \
            "ofw-mcp-${VERSION}.mcpb" \
            --clobber
